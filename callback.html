<!DOCTYPE html>
<html>
<head><title>Signing in...</title></head>
<body>
<pre id="debug" style="font-family:monospace;padding:20px;font-size:13px"></pre>
<script>
  const dbg = document.getElementById('debug');
  dbg.textContent = [
    'full href: ' + location.href,
    'hash: "' + location.hash + '"',
    'search: "' + location.search + '"',
  ].join('\n');
</script>
</body>
</html>
